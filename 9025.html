
<head>
    <style>
        body {
            overflow: hidden;
            background: #000000;
            margin-top: 0;
            margin-left: 0;
            color: #000000;
        }
        #startButton {
            display: block;
            width: 160px;
            height: 40px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            margin: 20px auto;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            box-shadow: 0px 0px 10px 2px #000000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div style="width: 100vw; height: 100vh; max-width:100%">
        <div id="game" style="display: none;"></div>
        <button id="startButton">PLAY</button>
    </div>
    <script>
        document.getElementById("game").style.display = "none";
        function startGame() {
            document.getElementById("game").style.display = "block";
            document.getElementById("startButton").style.display = "none";
            EJS_player = "#game";
            EJS_core = "gba";
            EJS_gameName = "Crash Superpack - Crash Bandicoot 2 - N-Tranced + Crash Nitro Kart";
            EJS_color = "#0064ff";
            EJS_startOnLoaded = true;
            EJS_pathtodata = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data";
            EJS_gameUrl = "https://raw.githubusercontent.com/ObitoCourage-commits/html/main/Crash%20Superpack%20-%20Crash%20Bandicoot%202%20-%20N-Tranced%20%2B%20Crash%20Nitro%20Kart/Crash%20Superpack%20-%20Crash%20Bandicoot%202%20-%20N-Tranced%20%2B%20Crash%20Nitro%20Kart%20(USA).gba";
            EJS_biosUrl = "https://raw.githubusercontent.com/ObitoCourage-commits/html/main/Spongebob%20Battle%20for%20Bikini%20Bottom/gba_bios.bin";
            loadGame();
        }
        document.getElementById("startButton").addEventListener("click", startGame);
        function loadGame() {
            var script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data/loader.js";
            document.body.appendChild(script);
        }
    </script>
</body>
