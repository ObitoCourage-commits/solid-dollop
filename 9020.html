<head>
    <style>
        body {
            overflow: hidden;
            background: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }
        #startButton {
            display: block;
            width: 160px;
            height: 40px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            box-shadow: 0px 0px 10px 2px #000000;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game" style="width:100vw;height:100vh;display:none;"></div>
    <button id="startButton">PLAY</button>
    <script>
        function startGame() {
            document.getElementById("game").style.display = "block";
            document.getElementById("startButton").style.display = "none";
            EJS_player = "#game";
            EJS_core = "gba";
            EJS_gameName = "Jurassic Park III: The DNA Factor";
            EJS_color = "#0064ff";
            EJS_startOnLoaded = true;
            EJS_pathtodata = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data";
            EJS_gameUrl = "https://raw.githubusercontent.com/ObitoCourage-commits/html/main/Jurassic%20Park%20III%3A%20The%20DNA%20Factor/Jurassic%20Park%20III%20-%20The%20DNA%20Factor%20(USA).gba";
            EJS_biosUrl = "https://raw.githubusercontent.com/ObitoCourage-commits/html/main/Spongebob%20Battle%20for%20Bikini%20Bottom/gba_bios.bin";
            var script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data/loader.js";
            document.body.appendChild(script);
        }
        document.getElementById("startButton").addEventListener("click", startGame);
    </script>
</body>
